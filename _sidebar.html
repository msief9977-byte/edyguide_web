<aside class="app-sidebar">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding: 0 10px;">
        <div
            style="background: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
            🎓</div>
        <h2 style="font-size: 1.2rem; font-weight: 800; letter-spacing: 1px;">EDUGUIDE</h2>
    </div>

    <nav style="display: flex; flex-direction: column; gap: 8px;">
        {% if session.get('role') == 'student' %}
        <a href="{{ url_for('dashboard') }}" class="nav-link {{ 'active' if request.endpoint == 'dashboard' }}">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a href="{{ url_for('chat_page') }}" class="nav-link {{ 'active' if request.endpoint == 'chat_page' }}">
            <i class="fas fa-robot"></i> AI Concierge
        </a>
        <a href="{{ url_for('gpa_page') }}" class="nav-link {{ 'active' if request.endpoint == 'gpa_page' }}">
            <i class="fas fa-calculator"></i> GPA Calculator
        </a>
        <a href="{{ url_for('career_page') }}" class="nav-link {{ 'active' if request.endpoint == 'career_page' }}">
            <i class="fas fa-briefcase"></i> Career Path
        </a>
        <a href="{{ url_for('marketplace_page') }}"
            class="nav-link {{ 'active' if request.endpoint == 'marketplace_page' }}">
            <i class="fas fa-book"></i> Library
        </a>
        <a href="{{ url_for('study_planner') }}" class="nav-link {{ 'active' if request.endpoint == 'study_planner' }}">
            <i class="fas fa-calendar-check"></i> Study Planner
        </a>
        <a href="{{ url_for('instructor_feedback') }}" class="nav-link {{ 'active' if request.endpoint == 'instructor_feedback' }}">
            <i class="fas fa-star-half-alt"></i> Feedback
        </a>
        {% elif session.get('role') == 'instructor' %}
        <a href="{{ url_for('admin_dashboard') }}"
            class="nav-link {{ 'active' if request.endpoint == 'admin_dashboard' }}">
            <i class="fas fa-chart-line"></i> Instructor Panel
        </a>
        <a href="{{ url_for('system_dashboard') }}" class="nav-link {{ 'active' if request.endpoint == 'system_dashboard' }}">
            <i class="fas fa-cogs"></i> System Dashboard
        </a>
        {% endif %}

        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="{{ url_for('logout') }}" class="nav-link" style="color: #ef4444;">
                <i class="fas fa-power-off"></i> Logout
            </a>
        </div>
    </nav>
</aside>

<style>
    .nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        border-radius: 10px;
        transition: all 0.2s;
    }

    .nav-link:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
    }

    .nav-link.active {
        background: var(--accent);
        color: white;
    }

    .nav-link i {
        width: 20px;
        text-align: center;
    }
</style>
